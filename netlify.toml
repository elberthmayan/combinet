# Arquivo de configuração para a Netlify

[build]
  # Onde estão os arquivos do seu site (o front-end)
  publish = "front"
  # CORREÇÃO: Apontamos para o diretório correto do back-end.
  functions = "back/netlify/functions"
  # NOVO: Força a instalação de dependências a partir do package.json da raiz
  command = "npm install"

# Regra mágica: Quando o site pedir por "/api/algo",
# a Netlify vai, secretamente, chamar nosso porteiro chamado "algo".
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
